# ============================================================
# 螺栓预紧力机器学习预测系统 - Docker Compose 配置
# ============================================================
version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: bolt_mysql
    platform: linux/amd64
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: bolt_preload
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups/mysql:/backups
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bolt_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bolt_backend
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=bolt_preload
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - CONFIG_PATH=/app/config/config.yaml
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - TIMESERIES_ENABLED=${TIMESERIES_ENABLED:-false}
      - TIMESERIES_BACKEND=${TIMESERIES_BACKEND:-timescaledb}
    ports:
      - "8081:8000"
    volumes:
      - ./backend/trained_models:/app/trained_models
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data
      - ./backups/app:/app/backups
      - ./backend/config:/app/config
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bolt_network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # InfluxDB 时序数据库（可选 profile: influxdb）
  influxdb:
    image: influxdb:2.7
    container_name: bolt_influxdb
    profiles: ["influxdb"]
    restart: unless-stopped
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=bolt
      - DOCKER_INFLUXDB_INIT_BUCKET=bolt_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-token
      - TZ=Asia/Shanghai
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
      - ./backups/influxdb:/backups
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - bolt_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # TimescaleDB 时序数据库（可选 profile: timescaledb）
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: bolt_timescaledb
    profiles: ["timescaledb"]
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bolt_timeseries
      - TZ=Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./backups/timescaledb:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bolt_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  mysql_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  timescaledb_data:
    driver: local

networks:
  bolt_network:
    driver: bridge
