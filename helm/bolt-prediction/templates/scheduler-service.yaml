apiVersion: v1
kind: Service
metadata:
  name: {{ include "bolt-prediction.fullname" . }}-scheduler
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "bolt-prediction.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  type: {{ .Values.scheduler.service.type }}
  ports:
    - port: {{ .Values.scheduler.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bolt-prediction.componentSelectorLabels" (dict "component" "scheduler" "Values" .Values "Release" .Release "Chart" .Chart) | nindent 4 }}
