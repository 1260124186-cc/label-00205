{{- if .Values.persistence.dataVolume.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "bolt-prediction.fullname" . }}-data
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    {{- include "bolt-prediction.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    {{- toYaml .Values.persistence.dataVolume.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.dataVolume.size }}
  {{- if or .Values.global.storageClass .Values.persistence.dataVolume.storageClass }}
  storageClassName: {{ .Values.persistence.dataVolume.storageClass | default .Values.global.storageClass }}
  {{- end }}
  volumeMode: Filesystem
{{- end }}
