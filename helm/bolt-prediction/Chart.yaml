apiVersion: v2
name: bolt-prediction
description: Bolt Preload Prediction System - Kubernetes Helm Chart
type: application
version: 1.0.0
appVersion: "1.0.0"
kubeVersion: ">=1.23.0-0"

keywords:
  - bolt
  - prediction
  - machine-learning
  - iot
  - monitoring

home: https://github.com/alkaid-sop/bolt-prediction
sources:
  - https://github.com/alkaid-sop/bolt-prediction

maintainers:
  - name: Alkaid-SOP Team
    email: devops@alkaid-sop.com

dependencies:
  - name: mysql
    version: "9.14.1"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mysql.enabled
  - name: redis
    version: "18.19.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

annotations:
  category: MachineLearning
  licenses: Apache-2.0
