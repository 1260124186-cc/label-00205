# ============================================================
# 螺栓预紧力机器学习预测系统 - 配置文件
# ============================================================

# 数据库配置
database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: "bolt_preload"
  charset: "utf8mb4"
  pool_size: 10
  max_overflow: 20

# API服务配置
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  workers: 4

# 模型配置
model:
  # 螺栓LSTM模型参数
  bolt_lstm:
    sequence_length: 100      # 输入序列长度
    input_dim: 2              # 输入维度 (时间, 预紧力)
    lstm_units_1: 128         # 第一层LSTM单元数
    lstm_units_2: 64          # 第二层LSTM单元数
    dropout_rate: 0.2         # Dropout率
    dense_units: 32           # 全连接层单元数
    output_classes: 5         # 输出类别数

  # 法兰面注意力模型参数
  flange_attention:
    max_bolts: 20             # 最大螺栓数
    sequence_length: 100      # 每个螺栓的序列长度
    attention_heads: 8        # 注意力头数
    lstm_units: 64            # LSTM单元数
    output_classes: 5         # 输出类别数

  # 训练参数
  training:
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
    early_stopping_patience: 10
    validation_split: 0.2
    lr_scheduler_type: "none"          # none / reduce_on_plateau / step / cosine
    class_imbalance:
      strategy: "weighted_loss"        # none / weighted_loss / oversampling
      oversampling_ratio: 1.0
    focal_loss:
      enabled: false
      gamma: 2.0
    early_stopping:
      enabled: true
      min_delta: 0.001
      mode: "min"                      # min (损失) / max (准确率)
    incremental:
      enabled: false
      freeze_layers: []                # 如 ["lstm1", "lstm2"]

  # 模型保存路径
  save_path: "./trained_models"

# 数据预处理配置
preprocessing:
  # 孤立森林异常检测
  isolation_forest:
    contamination: 0.1        # 异常比例
    n_estimators: 100         # 树数量
    random_state: 42

  # 卡尔曼滤波参数
  kalman_filter:
    process_noise: 0.01
    measurement_noise: 0.1

  # 标准化配置
  normalization:
    method: "minmax"          # minmax 或 zscore

# 预警策略配置
warning_strategy:
  # 策略类型: 1=应报尽报, 2=精准报警
  strategy_type: 1

  # 策略一: 应报尽报
  strategy_1:
    false_positive_threshold: 0.05    # 误报率阈值
    confidence_threshold: 0.7         # 置信度阈值

  # 策略二: 精准报警
  strategy_2:
    false_negative_threshold: 0.10    # 漏报率阈值
    confidence_threshold: 0.95        # 置信度阈值
    medium_risk_lstm_confidence_threshold: 0.6  # 中风险+低LSTM置信度时提高报警门槛

# 风险评估配置
risk_assessment:
  # 风险等级阈值
  high_risk_threshold: 3      # 1-3分为高风险
  medium_risk_threshold: 7    # 4-7分为中风险
  # 8-10分为低风险

  # 预紧力阈值 (可由模型动态调整)
  preload_thresholds:
    min_normal: 400           # 正常最小值
    max_normal: 800           # 正常最大值
    warning_deviation: 0.1    # 预警偏差比例
    critical_deviation: 0.2   # 紧急偏差比例

  # 先验权重 (总和应为1.0，可通过 API per-node 覆盖)
  prior_weights:
    mean_deviation: 0.25      # 均值偏离
    volatility: 0.20          # 波动性
    trend: 0.20               # 趋势
    extreme_values: 0.15      # 极值
    lstm_prediction: 0.20     # LSTM预测

# 集成学习配置
ensemble:
  # 是否启用集成学习二次裁决
  enabled: true

  # LSTM置信度阈值：低于此阈值时触发 Ensemble 二次裁决
  confidence_threshold: 0.7

  # 默认投票策略: hard / soft / weighted
  default_method: "weighted"

  # 默认权重（各子预测器权重，总和应为1.0）
  default_weights:
    lstm: 0.50          # LSTM 深度学习模型
    rule: 0.25          # 规则分类器
    statistical: 0.15   # 统计预测器
    trend: 0.10         # 趋势预测器

  # EMA 动态调权配置
  dynamic_weighting:
    enabled: true
    ema_alpha: 0.3      # EMA 平滑系数
    min_weight: 0.05    # 最小权重
    max_weight: 0.70    # 最大权重
    history_size: 50    # 历史记录窗口大小

  # 子预测器配置
  predictors:
    statistical:
      # 统计预测器阈值（基于历史均值）
      warning_std_threshold: 1.5
      critical_std_threshold: 2.5
    trend:
      # 趋势预测器斜率阈值
      warning_slope_threshold: 0.5
      critical_slope_threshold: 1.0
      window_size: 20

# 定时任务配置
scheduler:
  enabled: true

  # Leader选举配置
  enable_leader_election: true   # 是否启用Leader选举（大集群场景）
  lease_ttl_seconds: 60          # Leader租约有效期（秒）

  # 任务分片配置
  enable_sharding: true          # 是否启用任务分片
  shard_count: 4                 # 默认分片数
  max_parallel_shards: 4         # 最大并行分片数
  min_bolts_per_shard: 10        # 每个分片最少螺栓数
  max_shard_count: 16            # 最大分片数

  # 模型训练任务
  training_job:
    enabled: true
    cron: "0 2 * * 0"         # 每周日凌晨2点

  # 预测任务
  prediction_job:
    enabled: true
    cron: "*/30 * * * *"      # 每30分钟执行一次

  # 月度预测任务
  monthly_prediction_job:
    enabled: true
    cron: "0 3 1 * *"         # 每月1日凌晨3点

  # 告警自动升级任务
  alert_upgrade_job:
    enabled: true
    cron: "*/5 * * * *"       # 每5分钟检查一次升级

  # 装置关联图更新任务
  association_graph_update_job:
    enabled: true
    cron: "0 1 * * *"         # 每天凌晨1点执行

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"
  max_size: 10485760          # 10MB
  backup_count: 5
  training_dir: "./logs/training"

# 硬件配置
hardware:
  # 自动检测GPU, 若无则使用CPU
  prefer_gpu: true
  gpu_memory_fraction: 0.8

# API认证配置
auth:
  enabled: true
  master_key: "sk-master-change-me-in-production"
  default_rate_limit: 1000
  api_keys:
    - key: "sk-read-demo-key-001"
      name: "只读查询客户端"
      permissions: ["read"]
      rate_limit: 1000
    - key: "sk-write-demo-key-002"
      name: "读写客户端"
      permissions: ["read", "write"]
      rate_limit: 2000
    - key: "sk-admin-demo-key-003"
      name: "管理员客户端"
      permissions: ["read", "write", "admin"]
      rate_limit: 5000

  # SSO 单点登录配置
  sso:
    enabled: true
    sso_enabled: true
    service_account_enabled: true
    default_protocol: "oidc"

  # JWT 配置
  jwt:
    algorithm: "HS256"                # 签名算法: HS256 / RS256
    secret_key: "change-me-in-production-please-use-strong-secret"
    access_token_expire_minutes: 60   # Access Token 有效期（分钟）
    refresh_token_expire_days: 7      # Refresh Token 有效期（天）
    issuer: "bolt-prediction-system"
    audience: "bolt-prediction-api"
    use_database_key_store: true      # 是否使用数据库存储密钥（支持密钥轮换）
    key_rotation_days: 90             # 密钥轮换周期（天）

  # 会话管理配置
  session:
    max_sessions_per_user: 10         # 每个用户最大会话数
    inactivity_timeout_minutes: 30    # 空闲超时（分钟）
    absolute_timeout_hours: 24        # 绝对超时（小时）
    enable_concurrent_limit: true     # 是否启用并发会话限制

# 大模型配置
llm:
  enabled: false              # LLM 智能诊断全局开关
  provider: "local"           # local, openai, qwen
  openai:
    api_key: ""               # OpenAI API密钥
    model: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"
    max_tokens: 2000
    temperature: 0.7
  qwen:
    api_key: ""               # 通义千问API密钥
    model: "qwen-turbo"
    max_tokens: 2000
    temperature: 0.7
  report:
    diagnosis_summary_max_length: 200  # 诊断摘要最大字数
    enable_fallback: true               # LLM 不可用时是否回退到模板

# 模型版本管理
model_version:
  max_versions: 10            # 每个模型最大保留版本数
  auto_cleanup: true          # 是否自动清理旧版本

# 人工标注数据导入配置
label_import:
  import_dir: "./data/label_imports"   # 待导入CSV文件目录
  auto_review: false                    # 是否自动审核通过（否则需要人工审核）
  default_confidence: 0.95             # 默认标注置信度
  sequence_tolerance: 3                # 序列匹配容差（用于覆盖规则标签）

# ============================================================
# 联邦学习配置
# ============================================================
federated:
  # 是否启用联邦学习
  enabled: true

  # 聚合策略: fedavg, weighted_avg, median, trimmed_mean, fedprox, fedopt
  aggregation_strategy: "weighted_avg"

  # 聚合器配置
  aggregation_config:
    trim_ratio: 0.1           # 修剪均值比例
    mu: 0.01                  # FedProx近端项系数
    server_learning_rate: 1.0 # 服务器学习率
    enable_outlier_detection: true  # 是否启用异常值检测
    outlier_threshold: 2.0    # 异常值检测阈值（标准差倍数）

  # 隐私保护配置（全局默认，客户端可单独配置）
  privacy_config:
    mechanism: "none"         # none, dp, secagg, combined
    epsilon: 1.0              # 差分隐私epsilon
    delta: 1e-5               # 差分隐私delta
    noise_scale: 0.1          # 噪声缩放系数
    clip_norm: 1.0            # 梯度裁剪范数
    num_parties: 3            # 安全聚合参与方数量
    secret_share_threshold: 2 # 秘密共享阈值

  # 轮次配置
  max_rounds: 100             # 最大轮次
  round_timeout: 3600         # 轮次超时时间（秒）
  min_clients_per_round: 2    # 每轮最少客户端数

  # 全局模型保存路径
  save_path: "./trained_models/federated"
  max_versions: 10            # 每个模型最大保留版本数

  # 两层架构配置
  enable_two_level_arch: true # 是否启用全局+本地微调两层架构

  # 客户端配置
  client_config:
    # 更新类型: weights, gradients, difference
    update_type: "difference"

    # 本地训练参数
    local_epochs: 5           # 本地训练轮数
    local_batch_size: 32      # 本地批次大小
    local_learning_rate: 0.001 # 本地学习率

    # 本地微调参数
    fine_tune_epochs: 3       # 微调轮数
    fine_tune_layers:         # 需要微调的层名
      - "output"
      - "fc"

    # 两层架构
    enable_two_level_arch: true

    # 数据采样
    sample_ratio: 1.0         # 本地数据采样比例

    # 客户端隐私配置（覆盖全局配置）
    privacy_config:
      mechanism: "none"
      epsilon: 1.0
      delta: 1e-5
      noise_scale: 0.1
      clip_norm: 1.0

  # 客户端选择
  enable_client_selection: false  # 是否启用客户端选择
  client_selection_ratio: 0.8     # 每轮选择的客户端比例

# ============================================================
# 告警与通知配置
# ============================================================
alert:
  # 自动创建工单的最低告警级别 (1-4)，默认3（紧急级以上自动建单）
  auto_create_work_order_level: 3
  # 默认未处理升级时间（分钟），规则未单独配置时使用
  default_upgrade_minutes: 30

# 通知配置
notification:
  # 启用的通知渠道
  enabled_channels:
    - email
    - sms
    # - webhook
    # - dingtalk
    # - wechat
  # 最大重试次数
  max_retry: 3

# 工单配置
work_order:
  # 自动创建工单的最低告警级别 (1-4)
  auto_create_level: 3
  # 默认处理人（未指派时）
  default_assignee_id: null
  default_assignee_name: null

# ============================================================
# 数据质量治理配置
# ============================================================
data_quality:
  # 是否启用数据质量治理
  enabled: true

  # 质量规则引擎配置
  rules_engine:
    # 缺失率检测
    missing_rate:
      enabled: true
      warning_threshold: 0.03      # 警告阈值（3%）
      error_threshold: 0.05        # 错误阈值（5%）
      critical_threshold: 0.10     # 严重阈值（10%）

    # 重复数据检测
    duplicate:
      enabled: true
      warning_threshold: 0.02      # 警告阈值（2%）
      error_threshold: 0.05        # 错误阈值（5%）
      critical_threshold: 0.10     # 严重阈值（10%）
      check_consecutive_duplicates: true  # 检查连续重复值

    # 时间倒挂检测
    time_inversion:
      enabled: true
      allowed_deviation_ms: 1000   # 允许的时间偏差（毫秒）

    # 越界检测
    out_of_bounds:
      enabled: true
      method: "iqr"                # iqr 或 zscore 或 fixed
      iqr_multiplier: 1.5          # IQR乘数
      zscore_threshold: 3.0        # Z-score阈值
      # fixed方法的上下限（可选）
      lower_bound: null
      upper_bound: null

    # 漂移检测
    drift:
      enabled: true
      reference_window_size: 100   # 参考窗口大小
      test_window_size: 50         # 测试窗口大小
      step_size: 25                # 步长
      p_value_threshold: 0.05      # P值阈值
      min_drift_threshold: 0.05    # 最小漂移阈值（5%）

  # 质量评分配置
  quality_scoring:
    # 维度权重（总和应为1.0）
    dimension_weights:
      completeness: 0.30           # 完整性
      consistency: 0.25            # 一致性
      validity: 0.25               # 有效性
      stability: 0.20              # 稳定性

    # 质量等级阈值
    level_thresholds:
      excellent: 90                # >=90优秀
      good: 75                     # >=75良好
      fair: 60                     # >=60一般
      poor: 40                     # >=40较差
      # <40严重

    # 训练数据准入阈值
    training_eligibility:
      min_overall_score: 60        # 最低综合评分
      min_completeness: 70         # 最低完整性评分
      max_missing_rate: 0.10       # 最大缺失率
      exclude_critical_violations: true  # 排除严重违规数据

    # 置信度调整配置
    confidence_adjustment:
      min_adjustment: 0.3          # 最小置信度调整系数
      max_adjustment: 1.0          # 最大置信度调整系数
      score_sensitivity: 0.01      # 每1分的调整幅度

  # 数据过滤配置
  filtering:
    # 训练数据过滤
    training:
      strategy: "exclude"          # exclude 或 interpolate 或 mark
      remove_violations: true      # 移除违规数据点
      remove_out_of_bounds: true   # 移除越界数据
      remove_duplicates: true      # 移除重复数据
      min_sequence_length: 10      # 过滤后最小序列长度

    # 预测数据过滤
    prediction:
      strategy: "downgrade"        # downgrade 或 exclude 或 interpolate
      mark_violations: true        # 标记违规数据点
      interpolate_missing: true    # 插值填充缺失
      interpolation_method: "linear"  # 插值方法

  # 异常分类配置
  anomaly_classification:
    # 分类器权重
    classifier_weights:
      quality_based: 0.50          # 基于质量规则的分类器
      pattern_based: 0.30          # 基于模式的分类器
      anomaly_type: 0.20           # 基于异常类型的分类器

    # 分类置信度阈值
    min_confidence: 0.60           # 最低分类置信度

    # 采集异常判定阈值
    collection_anomaly_thresholds:
      high_missing_rate: 0.05      # 高缺失率阈值
      high_duplicate_rate: 0.05    # 高重复率阈值
      time_inversion_count: 2      # 时间倒挂次数阈值

    # 真异常判定阈值
    true_anomaly_thresholds:
      sudden_change_threshold: 3.0  # 突变阈值（标准差倍数）
      preload_drop_threshold: 0.15  # 预紧力下降阈值（15%）
      min_duration_points: 5       # 异常持续最小点数

  # 报告配置
  reporting:
    # 每日报告
    daily_report:
      enabled: true
      generate_time: "02:00"       # 生成时间
      save_to_db: true             # 保存到数据库
      top_n_problems: 10           # 问题传感器排行数量
      min_score_threshold: 60.0    # 问题传感器最低评分阈值

    # 报告保留策略
    retention:
      daily_reports_days: 90       # 日报保留天数
      check_history_days: 180      # 检查历史保留天数

  # 定时任务
  scheduler:
    # 实时数据质量检查
    realtime_check:
      enabled: true
      interval_seconds: 300        # 每5分钟检查一次

    # 每日报告生成
    daily_report:
      enabled: true
      cron: "0 2 * * *"            # 每天凌晨2点

  # 训练/预测集成
  integration:
    # 训练时自动过滤低质量数据
    auto_filter_training_data: true
    # 预测时自动调整置信度
    auto_adjust_prediction_confidence: true
    # 记录质量日志
    log_quality_metrics: true

# ============================================================
# 特征工程配置
# ============================================================
feature_engineering:
  # 是否启用特征工程（总开关）
  enabled: true

  # 启用的特征类别: temporal / statistical / domain
  feature_categories:
    - temporal
    - statistical
    - domain

  # 特征输入模式:
  #   "auxiliary"  -> 特征作为 LSTM 的辅助输入（拼接在 LSTM 输出后）
  #   "tabular"    -> 独立的 Tabular 分支，与 LSTM 分支在高层融合
  #   "concat"     -> 特征拼接到每个时间步的输入（扩展 LSTM input_dim）
  input_mode: "auxiliary"

  # Tabular 分支的网络结构（当 input_mode = "tabular" 时使用）
  tabular_branch:
    hidden_units: [64, 32]
    dropout_rate: 0.2
    activation: "relu"

  # 融合方式（auxiliary / tabular 模式时使用）:
  #   "concat"   -> 直接拼接
  #   "attention" -> 注意力加权融合
  fusion_mode: "concat"

  # 特征重要性计算配置
  importance:
    # 使用的方法: permutation / shap（仅 permutation 已实现）
    method: "permutation"

    # Permutation Importance 重复次数
    n_repeats: 10

    # 是否在训练结束后自动计算并写入日志
    compute_after_training: true

    # 采样比例（为加速，只使用部分验证集计算）
    sample_ratio: 0.5

    # 最少样本数（低于此数则跳过计算）
    min_samples: 30

# ============================================================
# 流式预测配置
# ============================================================
stream_prediction:
  # 是否启用流式预测
  enabled: false

  # 默认预测模式: batch | stream
  prediction_mode: batch

  # 滑动窗口配置
  window:
    # 窗口存储类型: memory | redis
    storage_type: memory
    # 窗口大小（数据点数）
    size: 100
    # 窗口过期时间（秒）
    ttl_seconds: 3600
    # Redis连接URL（storage_type=redis时使用）
    redis_url: "redis://localhost:6379/0"
    # Redis键前缀
    key_prefix: "stream_window"

  # 背压与限流配置
  backpressure:
    # 单节点最大并发流数
    max_concurrent_streams: 100
    # 每个流的速率限制（每秒消息数）
    rate_per_stream: 10.0
    # 最大等待队列大小
    max_queue_size: 500
    # 队列等待超时时间（秒）
    queue_timeout_seconds: 30.0

  # 流数据源配置
  sources:
    # HTTP 流（总是可用，通过API接入）
    http:
      enabled: true

    # Kafka 流
    kafka:
      enabled: false
      bootstrap_servers: "localhost:9092"
      topic: "bolt_data"
      group_id: "stream_prediction"

    # MQTT 流
    mqtt:
      enabled: false
      broker: "localhost"
      port: 1883
      topic: "bolt/data/+"
      client_id: "stream_prediction"
      username: ""
      password: ""

  # 事件发布配置
  event_publishing:
    # 事件发布类型: in_process | kafka | mqtt
    type: in_process

    # Kafka 发布配置
    kafka:
      bootstrap_servers: "localhost:9092"
      topic: "stream_events"

    # MQTT 发布配置
    mqtt:
      broker: "localhost"
      port: 1883
      topic_prefix: "stream/events"
      client_id: "stream_publisher"
      username: ""
      password: ""

# ============================================================
# 备件库存与 RUL 联动模块配置
# ============================================================
spare_parts:
  # RUL阈值配置（天）
  rul_thresholds:
    default: 30           # 普通阈值 - RUL低于此值生成需求建议
    urgent: 14            # 紧急阈值 - RUL低于此值标记为紧急
    critical: 7           # 特急阈值 - RUL低于此值标记为特急

  # 库存状态阈值
  stock_thresholds:
    shortage_ratio: 0.5   # 库存不足比例（可用库存/需求数量 < 此值为缺货）
    safety_stock_warning: 1.2  # 低于安全库存的预警倍数

  # 采购优化器默认配置
  purchase_optimizer:
    # 默认服务水平（0.90-0.999），对应Z分数:
    # 0.90=1.28, 0.95=1.645, 0.98=2.05, 0.99=2.33, 0.999=3.09
    default_service_level: 0.95

    # 安全库存计算方法: statistical(统计法) / days_coverage(天数覆盖法)
    default_safety_stock_method: "statistical"

    # 默认安全库存天数（days_coverage方法使用）
    default_safety_stock_days: 7

    # 需求统计历史天数
    default_history_days: 90

    # 单次订货成本（元/次）
    default_order_cost: 500.0

    # 年持有成本率（%）
    default_holding_cost_rate: 0.25

    # ABC分类阈值（按年使用价值占比）
    abc_thresholds:
      a: 0.80   # 前80%价值为A类
      b: 0.95   # 前80%-95%为B类
      # 剩余5%为C类

    # 经济订货批量（EOQ）最小/最大值限制
    eoq_limits:
      min_quantity: 1
      max_quantity: 10000

  # 自动扫描RUL定时任务
  auto_scan:
    enabled: true
    cron: "0 1 * * *"          # 每天凌晨1点执行
    auto_create_work_order: true  # 缺货时自动创建工单
    auto_upgrade_priority: true   # 缺货时自动升级工单优先级

  # 需求单自动审批配置
  auto_approval:
    enabled: false         # 是否启用自动审批
    max_amount: 10000      # 单SKU金额上限（元）
    max_urgency: "normal"  # 最大紧急程度（normal/urgent/critical）

  # 工单优先级升级配置
  work_order_upgrade:
    # 升级映射：库存状态 -> 优先级升级级别
    upgrade_levels:
      out_of_stock: 2       # 缺货升级2级（low→high）
      shortage: 1          # 库存不足升级1级（low→medium）
    # 是否更新截止时间
    update_due_time: true
    # 升级后截止时间（小时）
    due_time_hours:
      urgent: 24
      critical: 8

# ============================================================
# 时序数据库配置
# ============================================================
timeseries:
  # 是否启用时序数据库
  enabled: false

  # 后端类型: influxdb / timescaledb
  backend: "timescaledb"

  # InfluxDB 配置
  influxdb:
    url: "http://localhost:8086"
    token: "my-token"
    org: "bolt"
    bucket: "bolt_data"
    timeout: 30

  # TimescaleDB 配置
  timescaledb:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "postgres"
    database: "bolt_timeseries"
    pool_size: 10
    max_overflow: 20

  # 降采样配置
  downsampling:
    # 是否启用自动降采样
    enabled: true
    # 定时任务 cron 表达式（每小时执行）
    cron: "0 * * * *"
    # 保留策略
    retention:
      raw_days: 7          # 原始数据保留天数
      minute_days: 30      # 分钟级聚合保留天数
      hour_days: 365       # 小时级聚合保留天数

  # 预测流水线配置
  prediction:
    # 是否从时序数据库读取数据
    use_for_prediction: false
    # 窗口大小（数据点数）
    window_size: 100

# ============================================================
# 跨装置风险传播与聚合分析配置
# ============================================================
risk_propagation:
  # 是否启用风险传播
  enabled: true

  # 关联权重配置（各维度权重总和应为1.0）
  association_weights:
    same_pipeline: 0.30          # 同管线权重
    same_vibration_source: 0.25  # 同振动源权重
    same_shift: 0.05             # 同班次权重
    co_fault: 0.20               # 共故障权重
    physical: 0.10               # 物理邻接权重
    granger: 0.10                # Granger因果权重

  # 风险传播算法配置
  propagation:
    # 最大传播深度
    max_depth: 3
    # 深度衰减因子（每深一层乘以该系数）
    depth_decay: 0.6
    # 最小关联权重阈值（低于此值不传播）
    min_association_weight: 0.05
    # 源风险严重性系数（风险评分越高，传播强度越大）
    source_severity_factor: 0.5
    # 风险上调系数上限（避免无限放大）
    max_upregulation_coefficient: 3.0

  # 风险等级阈值（与风险模型保持一致）
  risk_levels:
    high:
      min: 1
      max: 3
    medium:
      min: 4
      max: 7
    low:
      min: 8
      max: 10

  # 共故障历史配置
  co_fault:
    # 历史数据时间窗口（天）
    history_days: 90
    # 最小共故障次数（低于此次数不计入权重）
    min_co_fault_count: 1
    # 最大共故障次数（用于归一化）
    max_co_fault_count: 20

  # 物理邻接配置
  physical:
    # 距离单位：公里（使用Haversine公式）
    distance_unit: "km"
    # 最大有效距离（公里）
    max_distance: 100.0
    # 距离衰减系数
    distance_decay: 0.05

  # 风险热力矩阵配置
  heatmap:
    # 是否包含对角线（装置自身）
    include_diagonal: false
    # 对角线值
    diagonal_value: 1.0

  # 传播路径配置
  paths:
    # 默认返回前K条路径
    default_top_k: 10
    # 路径最小总权重
    min_path_total_weight: 0.3
    # 路径最小平均权重
    min_path_avg_weight: 0.2

  # 数据库配置
  database:
    # 是否持久化关联关系到数据库
    persist_associations: true
    # 是否记录传播历史
    record_propagation_history: true
    # 传播历史保留天数
    history_retention_days: 180
