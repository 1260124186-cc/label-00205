# ============================================================
# 螺栓预紧力机器学习预测系统 - 配置文件
# ============================================================

# 数据库配置
database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  password: ""
  database: "bolt_preload"
  charset: "utf8mb4"
  pool_size: 10
  max_overflow: 20

  # 慢查询日志阈值（毫秒），超过此值的查询将被记录
  slow_query_threshold_ms: 500

  # N+1 检测配置
  n_plus_one_window_seconds: 2.0    # 检测窗口（秒）
  n_plus_one_threshold: 10          # 窗口内查询次数阈值

  # 批量/分片任务连接池配额（防止连接耗尽）
  quotas:
    batch_prediction:
      max_connections: 3            # 批量预测最多占用 3 个连接
    shard_task:
      max_connections: 4            # 分片任务最多占用 4 个连接
    training:
      max_connections: 2            # 训练任务最多占用 2 个连接
    archive:
      max_connections: 2            # 归档任务最多占用 2 个连接

  # 读写分离配置（预留开关，启用后主库写、从库读）
  read_write_split:
    enabled: false                  # 是否启用读写分离
    slave:
      host: ""                      # 从库主机地址（留空则不启用）
      port: 3306
      user: "readonly"
      password: ""
      # database: ""                # 从库数据库名（留空则与主库相同）
      pool_size: 10
      max_overflow: 20

# API服务配置
api:
  host: "0.0.0.0"
  port: 8000
  debug: false
  workers: 4

# 模型配置
model:
  # 螺栓LSTM模型参数
  bolt_lstm:
    sequence_length: 100      # 输入序列长度
    input_dim: 2              # 输入维度 (时间, 预紧力)
    lstm_units_1: 128         # 第一层LSTM单元数
    lstm_units_2: 64          # 第二层LSTM单元数
    dropout_rate: 0.2         # Dropout率
    dense_units: 32           # 全连接层单元数
    output_classes: 5         # 输出类别数

  # 法兰面注意力模型参数
  flange_attention:
    max_bolts: 20             # 最大螺栓数
    sequence_length: 100      # 每个螺栓的序列长度
    attention_heads: 8        # 注意力头数
    lstm_units: 64            # LSTM单元数
    output_classes: 5         # 输出类别数

  # 训练参数
  training:
    batch_size: 32
    epochs: 100
    learning_rate: 0.001
    early_stopping_patience: 10
    validation_split: 0.2
    lr_scheduler_type: "none"          # none / reduce_on_plateau / step / cosine
    class_imbalance:
      strategy: "weighted_loss"        # none / weighted_loss / oversampling
      oversampling_ratio: 1.0
    focal_loss:
      enabled: false
      gamma: 2.0
    early_stopping:
      enabled: true
      min_delta: 0.001
      mode: "min"                      # min (损失) / max (准确率)
    incremental:
      enabled: false
      freeze_layers: []                # 如 ["lstm1", "lstm2"]

  # 模型保存路径
  save_path: "./trained_models"

# 数据预处理配置
preprocessing:
  # 孤立森林异常检测
  isolation_forest:
    contamination: 0.1        # 异常比例
    n_estimators: 100         # 树数量
    random_state: 42

  # 卡尔曼滤波高级配置
  kalman:
    # 滤波模式: simple(标准) | adaptive(自适应) | extended(扩展)
    mode: "simple"

    # 是否输出诊断信息（增益序列、新息、误差协方差）供可解释性报告
    enable_diagnostics: true

    # 基础参数（所有传感器默认使用）
    base:
      process_noise: 0.01
      measurement_noise: 0.1
      initial_error_covariance: 1.0

    # 自适应模式专用参数
    adaptive:
      adaptation_rate: 0.1        # 自适应率 (0-1)
      innovation_window: 10       # 新息窗口大小
      upper_threshold: 1.5        # 新息方差超过预期倍数时调高R
      lower_threshold: 0.5        # 新息方差低于预期倍数时调低R
      min_measurement_noise_ratio: 0.1  # R最低为 base_R 的比例

    # 扩展卡尔曼（EKF）专用参数
    extended:
      # 状态转移函数类型: constant | linear_drift | custom
      state_transition: "constant"
      drift_rate: 0.0              # linear_drift 模式下的漂移率
      # 非线性观测函数（预留，当前实现为线性观测）
      observation_type: "linear"

    # 高噪声传感器 per-sensor 参数覆盖
    # key 为 sensor_id / bolt_id，value 为覆盖的参数
    sensor_overrides: {}
      # 示例:
      # "BOLT-001-HIGHNOISE":
      #   process_noise: 0.05
      #   measurement_noise: 0.5
      #   mode: "adaptive"
      # "BOLT-007-DRIFT":
      #   mode: "extended"
      #   extended:
      #     state_transition: "linear_drift"
      #     drift_rate: 0.001

    # 流式增量卡尔曼配置（与 SlidingWindowManager 配合）
    streaming:
      # 是否启用增量滤波（流式场景每条数据仅 update，不从头 filter）
      enabled: true
      # 滤波器状态持久化窗口（与滑动窗口同步 TTL）
      state_ttl_seconds: 3600

  # 兼容旧版配置（保留读取）
  kalman_filter:
    process_noise: 0.01
    measurement_noise: 0.1

  # 标准化配置
  normalization:
    method: "minmax"          # minmax 或 zscore

# 预警策略配置
warning_strategy:
  # 策略类型: 1=应报尽报, 2=精准报警
  strategy_type: 1

  # 策略一: 应报尽报
  strategy_1:
    false_positive_threshold: 0.05    # 误报率阈值
    confidence_threshold: 0.7         # 置信度阈值

  # 策略二: 精准报警
  strategy_2:
    false_negative_threshold: 0.10    # 漏报率阈值
    confidence_threshold: 0.95        # 置信度阈值
    medium_risk_lstm_confidence_threshold: 0.6  # 中风险+低LSTM置信度时提高报警门槛

# ============================================================
# 预测结果状态机配置
# ============================================================
state_machine:
  # 关注→正常降级需连续正常确认次数（连续N次预测为正常才降级）
  downgrade_confirm_n: 3

  # 幂等窗口（秒）：同一窗口内重复预测（定时+流式）只更新recent_time
  idempotency_window_seconds: 300

# 风险评估配置
risk_assessment:
  # 风险等级阈值
  high_risk_threshold: 3      # 1-3分为高风险
  medium_risk_threshold: 7    # 4-7分为中风险
  # 8-10分为低风险

  # 预紧力阈值 (可由模型动态调整)
  preload_thresholds:
    min_normal: 400           # 正常最小值
    max_normal: 800           # 正常最大值
    warning_deviation: 0.1    # 预警偏差比例
    critical_deviation: 0.2   # 紧急偏差比例

  # 先验权重 (总和应为1.0，可通过 API per-node 覆盖)
  prior_weights:
    mean_deviation: 0.25      # 均值偏离
    volatility: 0.20          # 波动性
    trend: 0.20               # 趋势
    extreme_values: 0.15      # 极值
    lstm_prediction: 0.20     # LSTM预测

# 集成学习配置
ensemble:
  # 是否启用集成学习二次裁决
  enabled: true

  # LSTM置信度阈值：低于此阈值时触发 Ensemble 二次裁决
  confidence_threshold: 0.7

  # 默认投票策略: hard / soft / weighted
  default_method: "weighted"

  # 默认权重（各子预测器权重，总和应为1.0）
  default_weights:
    lstm: 0.50          # LSTM 深度学习模型
    rule: 0.25          # 规则分类器
    statistical: 0.15   # 统计预测器
    trend: 0.10         # 趋势预测器

  # EMA 动态调权配置
  dynamic_weighting:
    enabled: true
    ema_alpha: 0.3      # EMA 平滑系数
    min_weight: 0.05    # 最小权重
    max_weight: 0.70    # 最大权重
    history_size: 50    # 历史记录窗口大小

  # 子预测器配置
  predictors:
    statistical:
      # 统计预测器阈值（基于历史均值）
      warning_std_threshold: 1.5
      critical_std_threshold: 2.5
    trend:
      # 趋势预测器斜率阈值
      warning_slope_threshold: 0.5
      critical_slope_threshold: 1.0
      window_size: 20

# 定时任务配置
scheduler:
  enabled: true

  # Leader选举配置
  enable_leader_election: true   # 是否启用Leader选举（大集群场景）
  lease_ttl_seconds: 60          # Leader租约有效期（秒）

  # 任务分片配置
  enable_sharding: true          # 是否启用任务分片
  shard_count: 4                 # 默认分片数
  max_parallel_shards: 4         # 最大并行分片数
  min_bolts_per_shard: 10        # 每个分片最少螺栓数
  max_shard_count: 16            # 最大分片数

  # 模型训练任务
  training_job:
    enabled: true
    cron: "0 2 * * 0"         # 每周日凌晨2点

  # 预测任务
  prediction_job:
    enabled: true
    cron: "*/30 * * * *"      # 每30分钟执行一次

  # 月度预测任务
  monthly_prediction_job:
    enabled: true
    cron: "0 3 1 * *"         # 每月1日凌晨3点

  # 告警自动升级任务
  alert_upgrade_job:
    enabled: true
    cron: "*/5 * * * *"       # 每5分钟检查一次升级

  # 装置关联图更新任务
  association_graph_update_job:
    enabled: true
    cron: "0 1 * * *"         # 每天凌晨1点执行

  # 设备健康离线检查任务
  device_health_check_job:
    enabled: true
    cron: "*/5 * * * *"       # 每5分钟检查一次离线设备

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/app.log"
  max_size: 10485760          # 10MB
  backup_count: 5
  training_dir: "./logs/training"

# 硬件配置
hardware:
  # 自动检测GPU, 若无则使用CPU
  prefer_gpu: true
  gpu_memory_fraction: 0.8

# API认证配置
auth:
  enabled: true
  master_key: "sk-master-change-me-in-production"
  default_rate_limit: 1000
  api_keys:
    - key: "sk-read-demo-key-001"
      name: "只读查询客户端"
      permissions: ["read"]
      rate_limit: 1000
    - key: "sk-write-demo-key-002"
      name: "读写客户端"
      permissions: ["read", "write"]
      rate_limit: 2000
    - key: "sk-admin-demo-key-003"
      name: "管理员客户端"
      permissions: ["read", "write", "admin"]
      rate_limit: 5000

  # SSO 单点登录配置
  sso:
    enabled: true
    sso_enabled: true
    service_account_enabled: true
    default_protocol: "oidc"

  # JWT 配置
  jwt:
    algorithm: "HS256"                # 签名算法: HS256 / RS256
    secret_key: "change-me-in-production-please-use-strong-secret"
    access_token_expire_minutes: 60   # Access Token 有效期（分钟）
    refresh_token_expire_days: 7      # Refresh Token 有效期（天）
    issuer: "bolt-prediction-system"
    audience: "bolt-prediction-api"
    use_database_key_store: true      # 是否使用数据库存储密钥（支持密钥轮换）
    key_rotation_days: 90             # 密钥轮换周期（天）

  # 会话管理配置
  session:
    max_sessions_per_user: 10         # 每个用户最大会话数
    inactivity_timeout_minutes: 30    # 空闲超时（分钟）
    absolute_timeout_hours: 24        # 绝对超时（小时）
    enable_concurrent_limit: true     # 是否启用并发会话限制

# 大模型配置
llm:
  enabled: false              # LLM 智能诊断全局开关
  provider: "local"           # local, openai, qwen
  openai:
    api_key: ""               # OpenAI API密钥
    model: "gpt-3.5-turbo"
    base_url: "https://api.openai.com/v1"
    max_tokens: 2000
    temperature: 0.7
  qwen:
    api_key: ""               # 通义千问API密钥
    model: "qwen-turbo"
    max_tokens: 2000
    temperature: 0.7
  report:
    diagnosis_summary_max_length: 200  # 诊断摘要最大字数
    enable_fallback: true               # LLM 不可用时是否回退到模板

# 模型版本管理
model_version:
  max_versions: 10            # 每个模型最大保留版本数
  auto_cleanup: true          # 是否自动清理旧版本

# 人工标注数据导入配置
label_import:
  import_dir: "./data/label_imports"   # 待导入CSV文件目录
  auto_review: false                    # 是否自动审核通过（否则需要人工审核）
  default_confidence: 0.95             # 默认标注置信度
  sequence_tolerance: 3                # 序列匹配容差（用于覆盖规则标签）

# ============================================================
# 联邦学习配置
# ============================================================
federated:
  # 是否启用联邦学习
  enabled: true

  # 聚合策略: fedavg, weighted_avg, median, trimmed_mean, fedprox, fedopt
  aggregation_strategy: "weighted_avg"

  # 聚合器配置
  aggregation_config:
    trim_ratio: 0.1           # 修剪均值比例
    mu: 0.01                  # FedProx近端项系数
    server_learning_rate: 1.0 # 服务器学习率
    enable_outlier_detection: true  # 是否启用异常值检测
    outlier_threshold: 2.0    # 异常值检测阈值（标准差倍数）

  # 隐私保护配置（全局默认，客户端可单独配置）
  privacy_config:
    mechanism: "none"         # none, dp, secagg, combined
    epsilon: 1.0              # 差分隐私epsilon
    delta: 1e-5               # 差分隐私delta
    noise_scale: 0.1          # 噪声缩放系数
    clip_norm: 1.0            # 梯度裁剪范数
    num_parties: 3            # 安全聚合参与方数量
    secret_share_threshold: 2 # 秘密共享阈值

  # 轮次配置
  max_rounds: 100             # 最大轮次
  round_timeout: 3600         # 轮次超时时间（秒）
  min_clients_per_round: 2    # 每轮最少客户端数

  # 全局模型保存路径
  save_path: "./trained_models/federated"
  max_versions: 10            # 每个模型最大保留版本数

  # 两层架构配置
  enable_two_level_arch: true # 是否启用全局+本地微调两层架构

  # 客户端配置
  client_config:
    # 更新类型: weights, gradients, difference
    update_type: "difference"

    # 本地训练参数
    local_epochs: 5           # 本地训练轮数
    local_batch_size: 32      # 本地批次大小
    local_learning_rate: 0.001 # 本地学习率

    # 本地微调参数
    fine_tune_epochs: 3       # 微调轮数
    fine_tune_layers:         # 需要微调的层名
      - "output"
      - "fc"

    # 两层架构
    enable_two_level_arch: true

    # 数据采样
    sample_ratio: 1.0         # 本地数据采样比例

    # 客户端隐私配置（覆盖全局配置）
    privacy_config:
      mechanism: "none"
      epsilon: 1.0
      delta: 1e-5
      noise_scale: 0.1
      clip_norm: 1.0

  # 客户端选择
  enable_client_selection: false  # 是否启用客户端选择
  client_selection_ratio: 0.8     # 每轮选择的客户端比例

# ============================================================
# 告警与通知配置
# ============================================================
alert:
  # 自动创建工单的最低告警级别 (1-4)，默认3（紧急级以上自动建单）
  auto_create_work_order_level: 3
  # 默认未处理升级时间（分钟），规则未单独配置时使用
  default_upgrade_minutes: 30

# 通知配置
notification:
  # 启用的通知渠道
  enabled_channels:
    - email
    - sms
    # - webhook
    # - dingtalk
    # - wechat
  # 最大重试次数
  max_retry: 3

# 工单配置
work_order:
  # 自动创建工单的最低告警级别 (1-4)
  auto_create_level: 3
  # 默认处理人（未指派时）
  default_assignee_id: null
  default_assignee_name: null

# ============================================================
# 数据质量治理配置
# ============================================================
data_quality:
  # 是否启用数据质量治理
  enabled: true

  # 质量规则引擎配置
  rules_engine:
    # 缺失率检测
    missing_rate:
      enabled: true
      warning_threshold: 0.03      # 警告阈值（3%）
      error_threshold: 0.05        # 错误阈值（5%）
      critical_threshold: 0.10     # 严重阈值（10%）

    # 重复数据检测
    duplicate:
      enabled: true
      warning_threshold: 0.02      # 警告阈值（2%）
      error_threshold: 0.05        # 错误阈值（5%）
      critical_threshold: 0.10     # 严重阈值（10%）
      check_consecutive_duplicates: true  # 检查连续重复值

    # 时间倒挂检测
    time_inversion:
      enabled: true
      allowed_deviation_ms: 1000   # 允许的时间偏差（毫秒）

    # 越界检测
    out_of_bounds:
      enabled: true
      method: "iqr"                # iqr 或 zscore 或 fixed
      iqr_multiplier: 1.5          # IQR乘数
      zscore_threshold: 3.0        # Z-score阈值
      # fixed方法的上下限（可选）
      lower_bound: null
      upper_bound: null

    # 漂移检测
    drift:
      enabled: true
      reference_window_size: 100   # 参考窗口大小
      test_window_size: 50         # 测试窗口大小
      step_size: 25                # 步长
      p_value_threshold: 0.05      # P值阈值
      min_drift_threshold: 0.05    # 最小漂移阈值（5%）

  # 质量评分配置
  quality_scoring:
    # 维度权重（总和应为1.0）
    dimension_weights:
      completeness: 0.30           # 完整性
      consistency: 0.25            # 一致性
      validity: 0.25               # 有效性
      stability: 0.20              # 稳定性

    # 质量等级阈值
    level_thresholds:
      excellent: 90                # >=90优秀
      good: 75                     # >=75良好
      fair: 60                     # >=60一般
      poor: 40                     # >=40较差
      # <40严重

    # 训练数据准入阈值
    training_eligibility:
      min_overall_score: 60        # 最低综合评分
      min_completeness: 70         # 最低完整性评分
      max_missing_rate: 0.10       # 最大缺失率
      exclude_critical_violations: true  # 排除严重违规数据

    # 置信度调整配置
    confidence_adjustment:
      min_adjustment: 0.3          # 最小置信度调整系数
      max_adjustment: 1.0          # 最大置信度调整系数
      score_sensitivity: 0.01      # 每1分的调整幅度

  # 数据过滤配置
  filtering:
    # 训练数据过滤
    training:
      strategy: "exclude"          # exclude 或 interpolate 或 mark
      remove_violations: true      # 移除违规数据点
      remove_out_of_bounds: true   # 移除越界数据
      remove_duplicates: true      # 移除重复数据
      min_sequence_length: 10      # 过滤后最小序列长度

    # 预测数据过滤
    prediction:
      strategy: "downgrade"        # downgrade 或 exclude 或 interpolate
      mark_violations: true        # 标记违规数据点
      interpolate_missing: true    # 插值填充缺失
      interpolation_method: "linear"  # 插值方法

  # 异常分类配置
  anomaly_classification:
    # 分类器权重
    classifier_weights:
      quality_based: 0.50          # 基于质量规则的分类器
      pattern_based: 0.30          # 基于模式的分类器
      anomaly_type: 0.20           # 基于异常类型的分类器

    # 分类置信度阈值
    min_confidence: 0.60           # 最低分类置信度

    # 采集异常判定阈值
    collection_anomaly_thresholds:
      high_missing_rate: 0.05      # 高缺失率阈值
      high_duplicate_rate: 0.05    # 高重复率阈值
      time_inversion_count: 2      # 时间倒挂次数阈值

    # 真异常判定阈值
    true_anomaly_thresholds:
      sudden_change_threshold: 3.0  # 突变阈值（标准差倍数）
      preload_drop_threshold: 0.15  # 预紧力下降阈值（15%）
      min_duration_points: 5       # 异常持续最小点数

  # 报告配置
  reporting:
    # 每日报告
    daily_report:
      enabled: true
      generate_time: "02:00"       # 生成时间
      save_to_db: true             # 保存到数据库
      top_n_problems: 10           # 问题传感器排行数量
      min_score_threshold: 60.0    # 问题传感器最低评分阈值

    # 报告保留策略
    retention:
      daily_reports_days: 90       # 日报保留天数
      check_history_days: 180      # 检查历史保留天数

  # 定时任务
  scheduler:
    # 实时数据质量检查
    realtime_check:
      enabled: true
      interval_seconds: 300        # 每5分钟检查一次

    # 每日报告生成
    daily_report:
      enabled: true
      cron: "0 2 * * *"            # 每天凌晨2点

  # 训练/预测集成
  integration:
    # 训练时自动过滤低质量数据
    auto_filter_training_data: true
    # 预测时自动调整置信度
    auto_adjust_prediction_confidence: true
    # 记录质量日志
    log_quality_metrics: true

# ============================================================
# 特征工程配置
# ============================================================
feature_engineering:
  # 是否启用特征工程（总开关）
  enabled: true

  # 启用的特征类别: temporal / statistical / domain
  feature_categories:
    - temporal
    - statistical
    - domain

  # 特征输入模式:
  #   "auxiliary"  -> 特征作为 LSTM 的辅助输入（拼接在 LSTM 输出后）
  #   "tabular"    -> 独立的 Tabular 分支，与 LSTM 分支在高层融合
  #   "concat"     -> 特征拼接到每个时间步的输入（扩展 LSTM input_dim）
  input_mode: "auxiliary"

  # Tabular 分支的网络结构（当 input_mode = "tabular" 时使用）
  tabular_branch:
    hidden_units: [64, 32]
    dropout_rate: 0.2
    activation: "relu"

  # 融合方式（auxiliary / tabular 模式时使用）:
  #   "concat"   -> 直接拼接
  #   "attention" -> 注意力加权融合
  fusion_mode: "concat"

  # 特征重要性计算配置
  importance:
    # 使用的方法: permutation / shap（仅 permutation 已实现）
    method: "permutation"

    # Permutation Importance 重复次数
    n_repeats: 10

    # 是否在训练结束后自动计算并写入日志
    compute_after_training: true

    # 采样比例（为加速，只使用部分验证集计算）
    sample_ratio: 0.5

    # 最少样本数（低于此数则跳过计算）
    min_samples: 30

# ============================================================
# 流式预测配置
# ============================================================
stream_prediction:
  # 是否启用流式预测
  enabled: false

  # 默认预测模式: batch | stream
  prediction_mode: batch

  # 滑动窗口配置
  window:
    # 窗口存储类型: memory | redis
    # 生产环境强制 redis（enforce_redis=true 时不可降级为 memory）
    storage_type: redis
    # 窗口大小（数据点数）
    size: 100
    # 窗口过期时间（秒），TTL 到期后 Redis 自动清理
    ttl_seconds: 3600
    # Redis连接URL（storage_type=redis / cluster_mode=standalone 时使用）
    redis_url: "redis://localhost:6379/0"
    # Redis 密码（可选）
    redis_password: ""
    # Redis 数据库编号
    redis_db: 0
    # 生产环境强制 Redis 后端（enforce_redis=true 时 Redis 不可用则启动失败）
    enforce_redis: true
    # 最大 bolt 窗口数（租户级别限流，0 表示不限）
    max_bolts: 50000
    # Redis 内存使用上限（MB），超过则拒绝新窗口写入
    memory_limit_mb: 512

    # Redis 集群模式: standalone | cluster | sentinel
    cluster_mode: standalone
    # Redis Cluster 节点列表（cluster_mode=cluster 时使用）
    cluster_nodes: []
      # - "redis-node1:6379"
      # - "redis-node2:6379"
      # - "redis-node3:6379"
    # Redis Sentinel 主节点名（cluster_mode=sentinel 时使用）
    sentinel_master: "mymaster"
    # Redis Sentinel 节点列表（cluster_mode=sentinel 时使用）
    sentinel_nodes: []
      # - "sentinel1:26379"
      # - "sentinel2:26379"
      # - "sentinel3:26379"
    # Redis Sentinel 密码（可选）
    sentinel_password: ""

    # 窗口数据导出/导入配置（边缘断网恢复场景）
    export_import:
      # 导出时是否压缩（gzip）
      compress: true
      # 导出数据最大条目数（防止单次导出过大）
      max_items_per_export: 100000

  # 背压与限流配置
  backpressure:
    # 单节点最大并发流数
    max_concurrent_streams: 100
    # 每个流的速率限制（每秒消息数）
    rate_per_stream: 10.0
    # 最大等待队列大小
    max_queue_size: 500
    # 队列等待超时时间（秒）
    queue_timeout_seconds: 30.0

  # 流数据源配置
  sources:
    # HTTP 流（总是可用，通过API接入）
    http:
      enabled: true

    # Kafka 流
    kafka:
      enabled: false
      bootstrap_servers: "localhost:9092"
      topic: "bolt_data"
      group_id: "stream_prediction"

    # MQTT 流
    mqtt:
      enabled: false
      broker: "localhost"
      port: 1883
      topic: "bolt/data/+"
      client_id: "stream_prediction"
      username: ""
      password: ""

  # 事件发布配置
  event_publishing:
    # 事件发布类型: in_process | kafka | mqtt | http
    type: in_process

    # Kafka 发布配置
    kafka:
      bootstrap_servers: "localhost:9092"
      topic: "stream_events"

    # MQTT 发布配置
    mqtt:
      broker: "localhost"
      port: 1883
      topic_prefix: "stream/events"
      client_id: "stream_publisher"
      username: ""
      password: ""

# ============================================================
# 备件库存与 RUL 联动模块配置
# ============================================================
spare_parts:
  # RUL阈值配置（天）
  rul_thresholds:
    default: 30           # 普通阈值 - RUL低于此值生成需求建议
    urgent: 14            # 紧急阈值 - RUL低于此值标记为紧急
    critical: 7           # 特急阈值 - RUL低于此值标记为特急

  # 库存状态阈值
  stock_thresholds:
    shortage_ratio: 0.5   # 库存不足比例（可用库存/需求数量 < 此值为缺货）
    safety_stock_warning: 1.2  # 低于安全库存的预警倍数

  # 采购优化器默认配置
  purchase_optimizer:
    # 默认服务水平（0.90-0.999），对应Z分数:
    # 0.90=1.28, 0.95=1.645, 0.98=2.05, 0.99=2.33, 0.999=3.09
    default_service_level: 0.95

    # 安全库存计算方法: statistical(统计法) / days_coverage(天数覆盖法)
    default_safety_stock_method: "statistical"

    # 默认安全库存天数（days_coverage方法使用）
    default_safety_stock_days: 7

    # 需求统计历史天数
    default_history_days: 90

    # 单次订货成本（元/次）
    default_order_cost: 500.0

    # 年持有成本率（%）
    default_holding_cost_rate: 0.25

    # ABC分类阈值（按年使用价值占比）
    abc_thresholds:
      a: 0.80   # 前80%价值为A类
      b: 0.95   # 前80%-95%为B类
      # 剩余5%为C类

    # 经济订货批量（EOQ）最小/最大值限制
    eoq_limits:
      min_quantity: 1
      max_quantity: 10000

  # 自动扫描RUL定时任务
  auto_scan:
    enabled: true
    cron: "0 1 * * *"          # 每天凌晨1点执行
    auto_create_work_order: true  # 缺货时自动创建工单
    auto_upgrade_priority: true   # 缺货时自动升级工单优先级

  # 需求单自动审批配置
  auto_approval:
    enabled: false         # 是否启用自动审批
    max_amount: 10000      # 单SKU金额上限（元）
    max_urgency: "normal"  # 最大紧急程度（normal/urgent/critical）

  # 工单优先级升级配置
  work_order_upgrade:
    # 升级映射：库存状态 -> 优先级升级级别
    upgrade_levels:
      out_of_stock: 2       # 缺货升级2级（low→high）
      shortage: 1          # 库存不足升级1级（low→medium）
    # 是否更新截止时间
    update_due_time: true
    # 升级后截止时间（小时）
    due_time_hours:
      urgent: 24
      critical: 8

# ============================================================
# 时序数据库配置
# ============================================================
timeseries:
  # 是否启用时序数据库
  enabled: false

  # 后端类型: influxdb / timescaledb
  backend: "timescaledb"

  # InfluxDB 配置
  influxdb:
    url: "http://localhost:8086"
    token: "my-token"
    org: "bolt"
    bucket: "bolt_data"
    timeout: 30

  # TimescaleDB 配置
  timescaledb:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "postgres"
    database: "bolt_timeseries"
    pool_size: 10
    max_overflow: 20

  # 降采样配置
  downsampling:
    # 是否启用自动降采样
    enabled: true
    # 定时任务 cron 表达式（每小时执行）
    cron: "0 * * * *"
    # 保留策略
    retention:
      raw_days: 7          # 原始数据保留天数
      minute_days: 30      # 分钟级聚合保留天数
      hour_days: 365       # 小时级聚合保留天数

  # 预测流水线配置
  prediction:
    # 是否从时序数据库读取数据
    use_for_prediction: false
    # 窗口大小（数据点数）
    window_size: 100

# ============================================================
# 跨装置风险传播与聚合分析配置
# ============================================================
risk_propagation:
  # 是否启用风险传播
  enabled: true

  # 关联权重配置（各维度权重总和应为1.0）
  association_weights:
    same_pipeline: 0.30          # 同管线权重
    same_vibration_source: 0.25  # 同振动源权重
    same_shift: 0.05             # 同班次权重
    co_fault: 0.20               # 共故障权重
    physical: 0.10               # 物理邻接权重
    granger: 0.10                # Granger因果权重

  # 风险传播算法配置
  propagation:
    # 最大传播深度
    max_depth: 3
    # 深度衰减因子（每深一层乘以该系数）
    depth_decay: 0.6
    # 最小关联权重阈值（低于此值不传播）
    min_association_weight: 0.05
    # 源风险严重性系数（风险评分越高，传播强度越大）
    source_severity_factor: 0.5
    # 风险上调系数上限（避免无限放大）
    max_upregulation_coefficient: 3.0

  # 风险等级阈值（与风险模型保持一致）
  risk_levels:
    high:
      min: 1
      max: 3
    medium:
      min: 4
      max: 7
    low:
      min: 8
      max: 10

  # 共故障历史配置
  co_fault:
    # 历史数据时间窗口（天）
    history_days: 90
    # 最小共故障次数（低于此次数不计入权重）
    min_co_fault_count: 1
    # 最大共故障次数（用于归一化）
    max_co_fault_count: 20

  # 物理邻接配置
  physical:
    # 距离单位：公里（使用Haversine公式）
    distance_unit: "km"
    # 最大有效距离（公里）
    max_distance: 100.0
    # 距离衰减系数
    distance_decay: 0.05

  # 风险热力矩阵配置
  heatmap:
    # 是否包含对角线（装置自身）
    include_diagonal: false
    # 对角线值
    diagonal_value: 1.0

  # 传播路径配置
  paths:
    # 默认返回前K条路径
    default_top_k: 10
    # 路径最小总权重
    min_path_total_weight: 0.3
    # 路径最小平均权重
    min_path_avg_weight: 0.2

  # 数据库配置
  database:
    # 是否持久化关联关系到数据库
    persist_associations: true
    # 是否记录传播历史
    record_propagation_history: true
    # 传播历史保留天数
    history_retention_days: 180

# ============================================================
# 设备健康监控配置
# ============================================================
device_health:
  # 是否启用设备健康监控
  enabled: true

  # 离线判定阈值倍数（超过 阈值×采样间隔 无数据则判定离线）
  offline_threshold_multiplier: 3

  # 卡死判定：连续 N 次数值完全不变
  stuck_consecutive_threshold: 5

  # 跳变判定：相对跳变阈值（比例）
  jump_threshold_ratio: 0.3

  # 跳变判定：绝对跳变阈值（最小跳变绝对值）
  jump_min_absolute: 10.0

  # 默认采样间隔（秒），未单独配置时使用
  default_sampling_interval: 60.0

  # 告警静默期（分钟），同设备同类型故障在此期间不重复告警
  silence_minutes: 30

  # 是否自动恢复（数据恢复正常后自动清除故障状态）
  auto_resolve: true

  # 置信度惩罚系数（按故障类型）
  confidence_penalty:
    offline: 0.3      # 离线：置信度乘以 0.3
    stuck: 0.5        # 卡死：置信度乘以 0.5
    jump: 0.6         # 跳变：置信度乘以 0.6

  # 多故障额外惩罚（同时存在多种故障时额外乘以该系数）
  multi_fault_penalty: 0.2

  # 网关集成配置
  gateway_integration:
    # 网关采集数据时是否自动上报心跳
    auto_report_heartbeat: true
    # 心跳上报批量大小
    heartbeat_batch_size: 100

# ============================================================
# 时序数据冷热归档与分区配置
# ============================================================
archive:
  # 是否启用归档模块（全局开关）
  enabled: true

  # 全局默认保留策略（租户未单独配置时使用）
  default_policy:
    # 策略类型: compliance(合规7年) / operations(运营1年) / custom(自定义)
    policy_type: "operations"
    # 热数据（MySQL）保留天数
    hot_retention_days: 90
    # 冷数据（对象存储）总保留天数
    cold_retention_days: 365
    # 合规保留年数（仅策略为 compliance 时生效，覆盖 cold_retention_days）
    compliance_retention_years: 7
    # 是否启用冷数据懒加载
    lazy_load_enabled: true

  # 冷存储配置
  cold_storage:
    # 存储类型: local / s3 / oss / minio / influxdb / timescaledb
    type: "local"
    # 压缩算法: snappy / gzip / zstd / brotli / lz4 / none
    compression: "snappy"

    # ---------- 本地文件系统（开发/测试）----------
    local:
      # 归档文件根目录
      base_dir: "./data/cold_storage"

    # ---------- S3 兼容对象存储（生产推荐）----------
    s3:
      # 自定义 Endpoint（MinIO/阿里云OSS等填此处，AWS S3留空）
      endpoint_url: ""
      # 区域
      region: "us-east-1"
      # 存储桶名
      bucket: "bolt-preload-archive"
      # 访问密钥（建议通过环境变量 ARCHIVE_S3_ACCESS_KEY 注入）
      access_key: ""
      secret_key: ""
      # Bucket 内的基础路径前缀
      base_path: "timeseries"
      # 是否使用 SSL
      use_ssl: true
      # 存储等级: standard / standard_ia / glacier / deep_archive
      storage_class: "standard_ia"
      # 服务端加密
      server_side_encryption: "AES256"

    # ---------- 阿里云 OSS ----------
    oss:
      endpoint_url: "https://oss-cn-hangzhou.aliyuncs.com"
      bucket: "bolt-preload-archive"
      access_key: ""
      secret_key: ""
      base_path: "timeseries"

    # ---------- MinIO ----------
    minio:
      endpoint_url: "http://localhost:9000"
      region: "us-east-1"
      bucket: "bolt-preload-archive"
      access_key: "minioadmin"
      secret_key: "minioadmin"
      base_path: "timeseries"
      use_ssl: false

  # 归档任务调度（全局默认，租户可单独覆盖）
  scheduler:
    # 月度归档任务（热→冷）
    monthly_archive:
      enabled: true
      # Cron 表达式：默认每月1日凌晨3点
      cron: "0 3 1 * *"
      # 归档批大小（每批从MySQL读取的行数）
      batch_size: 50000
      # 最大并行归档任务数（按租户）
      max_parallel: 2
      # 归档完成后是否从热库删除
      delete_from_hot: true
      # 归档校验：写后读校验完整性
      verify_after_write: true

    # 过期冷数据清理任务
    purge_expired:
      enabled: true
      # Cron：默认每月1日凌晨4点
      cron: "0 4 1 * *"
      # 是否物理删除（false=仅标记状态为deleted）
      permanent_delete: false

    # 分区键维护任务
    partition_maintenance:
      enabled: true
      # Cron：默认每天凌晨2:30
      cron: "30 2 * * *"
      # 预创建未来几个月的分区
      precreate_months: 2

  # 懒加载（冷→热查询）配置
  lazy_load:
    # 是否全局启用
    enabled: true
    # 同步模式最大等待秒数（超时降级为异步）
    sync_timeout_seconds: 10
    # 异步模式默认优先级: low / normal / high / urgent
    default_priority: "normal"
    # 最大并发懒加载请求数（全局）
    max_concurrent: 5
    # 单请求最多加载的归档文件数（防止OOM）
    max_files_per_request: 100
    # 回迁到热库后的过期时间（小时）
    restore_cache_hours: 72

  # 查询路由默认配置
  query_routing:
    # 训练任务默认读取层级: hot_only / hot_warm / all
    training_default_tier: "hot_only"
    # 预测任务默认读取层级
    prediction_default_tier: "hot_only"
    # 分析任务默认读取层级
    analysis_default_tier: "hot_warm"
    # 报表任务默认读取层级
    reporting_default_tier: "hot_warm"
    # 合规审计默认读取层级
    compliance_default_tier: "all"
    # 时间范围超阈值时是否自动升级层级
    auto_upgrade_tier: true
    # 升级后的警告是否返回给调用方
    return_upgrade_warnings: true

  # 按租户差异化配置（可选，未配置的租户使用默认）
  tenant_overrides:
    # 示例：特定合规要求租户（tenant_id = 99）
    # 99:
    #   policy_type: "compliance"
    #   hot_retention_days: 90
    #   cold_retention_days: 2555   # 7年
    #   cold_storage_type: "s3"
    #   monthly_archive_cron: "0 1 1 * *"

  # 监控与告警
  monitoring:
    # 归档失败告警阈值（连续失败次数）
    failure_alert_threshold: 3
    # 冷存储使用率告警阈值（%）
    storage_usage_warn_percent: 80
    # 归档速度慢告警：单任务超过N分钟
    slow_job_alert_minutes: 60
    # 指标上报到 Prometheus（需安装 prometheus_client）
    expose_prometheus_metrics: false

# ============================================================
# Webhook 出站订阅配置
# ============================================================
webhook:
  enabled: true
  retry_interval_seconds: 60
  max_delivery_log_days: 30
  default_timeout_seconds: 10
  default_max_retries: 5
  digest_window_seconds: 300

# ============================================================
# 模型漂移检测与自动重训编排配置
# ============================================================
model_drift:
  # 是否启用模型漂移检测（总开关）
  enabled: true

  # 调度配置
  scheduler:
    # 定时任务 Cron：默认每天凌晨1点执行
    cron: "0 1 * * *"
    # 是否启用Leader选举（集群模式避免重复执行）
    leader_election_required: true
    # 处理超时时间（秒）
    timeout_seconds: 3600

  # 漂移检测默认阈值（可被数据库 sc_model_drift_config 覆盖）
  default_thresholds:
    # PSI（群体稳定性指数）阈值
    # <0.1: 无漂移  0.1~0.25: 轻度漂移  >0.25: 显著漂移
    psi: 0.2
    # KS检验 p值阈值（低于则拒绝同分布假设）
    ks_p_value: 0.05
    # 置信度分布漂移阈值（KS统计量）
    confidence_drift: 0.15
    # 误报率阈值
    false_positive_rate: 0.10
    # 误报率统计窗口（天）
    false_positive_window_days: 7
    # 特征均值偏移阈值（标准差倍数）
    feature_mean_shift: 2.0
    # 综合漂移分数阈值
    composite_score: 0.6

  # 各检测维度权重（总和应为 1.0）
  dimension_weights:
    psi: 0.25
    ks: 0.20
    confidence: 0.25
    false_positive: 0.20
    feature_shift: 0.10

  # 响应策略配置
  response:
    # 默认响应策略: notify / shadow_retrain / auto_retrain
    default_strategy: "notify"
    # 连续 N 天超阈值才触发响应（防止偶发误报）
    consecutive_days_alert: 2
    # Shadow 模式最低质量门槛（新版本指标需达到当前版本的百分比）
    shadow_retrain_quality_bar: 0.9
    # 自动重训最小间隔天数（避免频繁重训）
    auto_retrain_min_days: 7

    # 通知配置
    notification:
      # 启用的通知渠道
      channels:
        - email
        # - dingtalk
        # - webhook
      # 通知目标（按渠道配置）
      targets:
        email:
          - "admin@example.com"
        dingtalk:
          - ""
        webhook:
          - ""
      # 告警级别映射（漂移等级 → 告警级别 1-4）
      level_mapping:
        low: 1
        medium: 2
        high: 3
        critical: 4

    # 重训配置
    retraining:
      # 是否启用增量训练
      incremental: true
      # 是否强制重训（忽略数据量不足等限制）
      force: true
      # 重训完成后是否自动评估指标
      auto_evaluate: true
      # 指标达标后是否自动激活（仅 auto_retrain 策略）
      auto_activate: true
      # Shadow 模式的观察期（天），观察期内指标持续达标才建议激活
      shadow_observation_days: 3

  # 数据窗口配置
  data_window:
    # 当前数据窗口（天），用于与基线对比
    current_days: 7
    # 基线数据窗口（天），用于建立基准分布
    baseline_days: 30
    # 每类数据的最大采样数（避免内存溢出）
    max_samples_per_dimension: 5000
    # 最小有效样本数（低于则跳过该维度检测）
    min_samples: 30

  # 基线管理配置
  baseline:
    # 是否在模型训练完成后自动建立基线
    auto_create_after_training: true
    # 基线过期天数（超过则自动重算）
    expire_days: 180
    # 基线更新策略: on_retrain / scheduled / manual
    update_policy: "on_retrain"

  # 事件保留配置
  event_retention:
    # 漂移事件保留天数
    events_days: 365
    # 基线快照保留天数
    baseline_days: 730

  # 调度任务配置（供 scheduler.py 读取）
  model_drift_job:
    enabled: true
    # 每天凌晨 1 点执行
    cron: "0 1 * * *"

# ============================================================
# 灾备备份与恢复配置
# ============================================================
backup:
  # 灾备模块全局开关
  enabled: true

  # 本地备份存储根目录
  base_path: "./data/backups"

  # 临时工作目录（打包过程使用，建议与 base_path 在同一磁盘）
  temp_path: "./data/backups/.tmp"

  # 模型文件目录（绝对路径或相对于项目根，增量/全量均包含）
  models_path: "./trained_models"

  # 配置文件目录（增量/全量均包含）
  config_path: "./backend/config"

  # 压缩配置
  compress:
    # 压缩格式: gzip / zstd / none
    format: "gzip"
    # gzip 压缩级别 1-9，zstd 级别 1-22
    level: 6
    # 是否在归档内包含文件级 checksum 清单
    include_manifest: true

  # 完整性校验
  integrity:
    # 整体归档哈希算法: sha256 / md5 / both
    hash_algo: "both"
    # 组件级文件清单哈希（写入 checksums_detail JSON）
    component_manifest: true

  # 保留策略（天）
  retention:
    # 每日增量备份保留天数
    incremental_days: 7
    # 每周全量备份保留天数
    weekly_days: 90
    # 月度归档（如需要，可扩展月度备份任务）
    monthly_days: 180
    # pre-restore 快照保留天数（用于恢复失败回滚）
    snapshot_days: 7

  # 调度配置（供 TaskScheduler 读取）
  scheduler:
    # 每日增量备份（仅模型+配置）
    daily_incremental:
      enabled: true
      # Cron：默认每日凌晨 02:30（避开训练/归档窗口）
      cron: "30 2 * * *"

    # 每周全量备份（包含 DB dump）
    weekly_full:
      enabled: true
      # Cron：默认每周日凌晨 03:00（全量备份耗时较长，放在增量之后）
      cron: "0 3 * * 0"

    # 每次全量备份后是否自动触发过期清理（默认开启）
    auto_purge_after_full: true

  # MySQL 数据库 dump 配置（全量备份使用）
  database:
    # 是否在全量备份中包含 DB dump
    include_dump: true
    # mysqldump 可执行路径（留空则从 PATH 查找）
    mysqldump_path: ""
    # mysql 客户端可执行路径（恢复时导入使用）
    mysql_path: ""
    # dump 额外参数（如 --ignore-table=xxx --single-transaction 等）
    extra_args:
      - "--single-transaction"
      - "--quick"
      - "--routines"
      - "--triggers"

  # 异地备份 - S3 兼容对象存储（AWS S3 / MinIO / 阿里云 OSS 等）
  remote_storage:
    # 全局开关：启用后将备份文件上传至对象存储
    enabled: false

    # 默认 Provider: s3 / minio / oss
    provider: "s3"

    # ---------- 环境变量优先（推荐） ----------
    # BACKUP_REMOTE_ENDPOINT      - endpoint（MinIO/OSS必填，AWS S3可留空）
    # BACKUP_REMOTE_ACCESS_KEY    - Access Key
    # BACKUP_REMOTE_SECRET_KEY    - Secret Key
    # BACKUP_REMOTE_BUCKET        - Bucket 名称
    # BACKUP_REMOTE_REGION        - 区域（AWS 默认 us-east-1）

    # ---------- 配置文件方式（环境变量未设置时兜底） ----------
    # 连接配置
    endpoint_url: ""                 # MinIO: http://minio:9000 ; 阿里云OSS: https://oss-cn-hangzhou.aliyuncs.com
    region: "us-east-1"
    bucket: "bolt-preload-backups"
    access_key: ""                   # 建议通过环境变量注入，避免明文
    secret_key: ""

    # 桶内基础路径前缀
    base_path: "disaster_recovery"

    # 网络与安全
    use_ssl: true                    # 生产强制开启
    verify_ssl: true                 # 自签证书场景可临时关
    addressing_style: "path"         # path (MinIO默认) / virtual (AWS S3默认)
    connect_timeout_seconds: 10
    read_timeout_seconds: 300

    # 存储等级（取决于 provider 支持）
    # AWS: STANDARD / STANDARD_IA / GLACIER / DEEP_ARCHIVE
    # MinIO 建议 STANDARD
    storage_class: "STANDARD_IA"

    # 服务端加密（SSE）
    server_side_encryption: "AES256"   # AES256 / aws:kms / 空
    # sse_kms_key_id: ""               # SSE-KMS 时填写

    # 并发与重试
    max_concurrency: 2                 # 同时并发上传的分片/文件数
    multipart_threshold_mb: 100        # 大于该大小启用分段上传
    multipart_chunksize_mb: 50
    max_retries: 3                     # 失败重试次数
    retry_backoff_seconds: 2           # 指数退避初始秒数

    # 本地已删除时是否同步删除远程（默认 false，防止误删）
    sync_deletes: false

    # 各 Provider 覆盖（同名键覆盖上方默认值）
    providers:
      minio:
        endpoint_url: "http://localhost:9000"
        region: "us-east-1"
        bucket: "bolt-preload-backups"
        access_key: "minioadmin"
        secret_key: "minioadmin"
        use_ssl: false
        addressing_style: "path"
        storage_class: "STANDARD"
      oss:
        endpoint_url: "https://oss-cn-hangzhou.aliyuncs.com"
        bucket: "bolt-preload-backups"
        access_key: ""
        secret_key: ""
        addressing_style: "virtual"
        storage_class: "IA"

  # 恢复流程配置
  restore:
    # 恢复前是否自动创建 pre-restore 快照（强烈建议开启）
    auto_pre_snapshot: true
    # 恢复后是否自动刷新模型缓存
    auto_refresh_cache: true
    # 原目录重命名前缀（恢复失败时可手动回滚）
    rollback_dir_suffix: ".pre_restore_{timestamp}"
    # 恢复后校验：检查文件完整性（checksum 比对）
    verify_after_restore: true
    # 恢复后缓存刷新最大等待秒数（超时不阻塞主流程）
    cache_refresh_timeout_seconds: 120
